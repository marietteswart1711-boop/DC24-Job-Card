services:
  - type: web
    name: dc24-job-card
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python3 server.py"
    envVars:
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USE_TLS
        sync: false
      - key: SMTP_USE_SSL
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_TO
        sync: false
      - key: COMPANY_NAME
        sync: false
      - key: GOOGLE_REVIEW_URL
        sync: false
